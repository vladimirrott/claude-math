name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm test
      - run: npm pack --dry-run

  publish:
    needs: test
    # Skipped unless npm publishing is set up: set repo variable NPM_PUBLISH=true
    # and add the NPM_TOKEN secret. Keeps tags/releases from red-failing on npm auth.
    if: startsWith(github.ref, 'refs/tags/v') && vars.NPM_PUBLISH == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: npm test
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
